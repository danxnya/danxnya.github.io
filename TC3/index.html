<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Validador de PDA</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/styles/default.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/styles/github-dark.min.css" />
    <link rel="icon" href="/TC3/fonts/items/ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="/TC3/css/main.css" />
    <style>
        @import url("https://fonts.googleapis.com/css?family=Raleway:400");

        @font-face {
            font-family: "Font";
            src: url("/TC3/fonts/items/JetBrains.ttf");
        }

        .typing-animation {
            border-right: .15em solid rgb(255, 255, 255); /* Cursor de la escritura */
            white-space: nowrap; /* Evita el salto de línea */
            overflow: hidden; /* Oculta el texto que se desborda */
            animation: typing 4s steps(30, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar color">
        <!-- Barra de navegación en rojo -->
        <a class="navbar-brand" href="/TC3/index.html">PDA Validador de sintaxis</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href="/TC3/graph.html">Grafo <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/TC3/code/three.html">Arbol</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/TC3/Grammar.html">Gramatica</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="center-vertically-and-horizontally">
        <div class="text-center">
            <h1 class="typing-animation">&lt; TC - Practica 3 - Gramaticas independientes de contexto &gt;</h1>
            <h2 class="typing-animation">&lt; Franco Rayas Angel Damián &gt;</h2>
            <input type="file" id="fileInput" class="btn color" />
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalLabel">Resultados</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <pre id="resultContent"></pre>
                    <hr />
                    <pre class="bordered"><code id="fileDisplayArea" class="language-c color1"></code></pre>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/highlight.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script type="module" src="/TC3/js/App.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const elements = document.querySelectorAll('.typing-animation');
            elements.forEach(element => {
                const text = element.textContent;
                element.textContent = '';
                let i = 0;
                const speed = 80;

                function typeWriter() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                        setTimeout(typeWriter, speed);
                    }
                }

                typeWriter();
            });
        });
    </script>
</body>
</html>
